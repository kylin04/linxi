<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINXI ESPORTS</title>
  <meta name="description" content="点击 Logo 进入公众号文章。" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at 20% 15%, rgba(132, 70, 255, 0.36), transparent 32%),
        radial-gradient(circle at 80% 85%, rgba(255, 74, 210, 0.22), transparent 34%),
        linear-gradient(135deg, #07070c 0%, #12091f 52%, #050507 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 28px;
    }

    .page {
      width: 100%;
      max-width: 520px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      padding: 38px 24px 34px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 30px;
      background: rgba(10, 10, 18, 0.66);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        0 0 60px rgba(126, 72, 255, 0.22);
      backdrop-filter: blur(18px);
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(68vw, 230px);
      height: min(68vw, 230px);
      max-width: 230px;
      max-height: 230px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12),
        0 0 42px rgba(138, 78, 255, 0.48);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      overflow: hidden;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .logo-link:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.18),
        0 0 58px rgba(190, 91, 255, 0.68);
    }

    .logo-link:active {
      transform: scale(0.98);
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .subtitle {
      margin-top: 24px;
      font-size: clamp(16px, 4.8vw, 20px);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    @media (max-width: 420px) {
      body {
        padding: 20px;
      }

      .card {
        padding: 28px 18px 26px;
        border-radius: 24px;
      }

      .logo-link {
        border-radius: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="公众号文章入口">
      <a
        class="logo-link"
        href="https://mp.weixin.qq.com/s/X8lvgq8h6evOZeIR1YYXAw"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="进入公众号文章"
      >
        <img
          class="logo"
          src="logo.png"
          alt="LINXI ESPORTS Logo"
        />
      </a>

      <p class="subtitle">点击 Logo 进入公众号文章</p>
    </section>
  </main>
</body>
</html>
